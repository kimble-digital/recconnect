<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CONNECTED 2026 — Social cards</title>
<meta name="robots" content="noindex" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --orange:#ff6a13; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0a0a;color:#fff;font-family:'Inter',system-ui,sans-serif;padding:0 56px 90px;}
  header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,106,19,.25);padding:30px 0 18px;margin-bottom:8px;}
  .wm{display:flex;align-items:center;gap:14px;}
  .boxtag{font-family:'Bebas Neue';font-size:24px;letter-spacing:.04em;background:var(--orange);color:#0a0a0a;padding:1px 10px;border-radius:5px;}
  .wm-lbl{font-family:'Bebas Neue';text-transform:uppercase;letter-spacing:.22em;font-size:18px;color:rgba(255,255,255,.6);}
  header h1{font-family:'Bebas Neue';text-transform:uppercase;letter-spacing:.02em;font-size:44px;margin-top:14px;}
  .filter{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .chip{background:transparent;color:rgba(255,255,255,.75);border:1px solid rgba(255,106,19,.4);border-radius:999px;padding:7px 18px;font-family:'Bebas Neue';letter-spacing:.1em;text-transform:uppercase;font-size:16px;cursor:pointer;transition:all .15s;}
  .chip:hover{border-color:var(--orange);color:#fff;}
  .chip.active{background:var(--orange);color:#0a0a0a;border-color:var(--orange);}
  section{margin-top:48px;}
  section>h2{font-family:'Bebas Neue';text-transform:uppercase;letter-spacing:.14em;font-size:30px;color:var(--orange);border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:10px;margin-bottom:26px;}
  .row{display:flex;flex-wrap:wrap;gap:24px;}
  .thumb{width:300px;}
  .frame{width:300px;height:300px;border-radius:10px;overflow:hidden;background:#000;box-shadow:0 12px 34px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);}
  .frame iframe{width:1280px;height:1280px;border:0;transform:scale(.234375);transform-origin:top left;pointer-events:none;}
  figcaption{display:flex;justify-content:space-between;align-items:center;margin-top:11px;font-size:13px;}
  figcaption .t{color:rgba(255,255,255,.6);}
  .acts a{font-family:'Bebas Neue';letter-spacing:.08em;text-transform:uppercase;font-size:15px;color:var(--orange);text-decoration:none;margin-left:14px;}
  .acts a:hover{text-decoration:underline;}
  .hidden{display:none!important;}
</style>
</head>
<body>
  <header>
    <div class="wm"><span class="boxtag">BOX</span><span class="wm-lbl">× RecConnect</span></div>
    <h1>CONNECTED 2026 · Social cards</h1>
    <div class="filter">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="event">Event</button>
      <button class="chip" data-filter="speakers">Speakers</button>
      <button class="chip" data-filter="sponsors">Sponsors</button>
    </div>
  </header>

  <div id="grid"></div>

  <script>
    // Files live in /socials/. Add a card = add a line.
    const BASE = '/socials/';
    const CARDS = [
      { group:'event',    file:'connected-card-1-announce.html',   title:'Announce' },
      { group:'event',    file:'connected-card-2-statement.html',  title:'Statement' },
      { group:'event',    file:'connected-card-3-experience.html', title:'Experience' },

      { group:'speakers', file:'speaker-adam-oldfield.html',  title:'Adam Oldfield' },
      { group:'speakers', file:'speaker-amy-bathie.html',     title:'Amy Bathie' },
      { group:'speakers', file:'speaker-ellie-hibberd.html',  title:'Ellie Hibberd' },
      { group:'speakers', file:'speaker-louise-wrench.html',  title:'Louise Wrench' },
      { group:'speakers', file:'speaker-michelle-flynn.html', title:'Michelle Flynn' },
      { group:'speakers', file:'speaker-rohan-shah.html',    title:'Rohan Shah' },

      { group:'sponsors', file:'sponsor-keybridge.html', title:'Keybridge IT (Headline)' },
      { group:'sponsors', file:'sponsor-deel.html',      title:'Deel (Gold)' },
      { group:'sponsors', file:'sponsor-3r.html',        title:'3R (Gold)' },
      { group:'sponsors', file:'sponsor-ringover.html',  title:'Ringover (Gold)' },
      { group:'sponsors', file:'sponsor-bullhorn.html',  title:'Bullhorn (Gold)' },
      { group:'sponsors', file:'sponsor-xemplo.html',    title:'Xemplo (Silver)' },
      { group:'sponsors', file:'sponsor-wave.html',      title:'Wave (Silver)' },
      { group:'sponsors', file:'sponsor-shazamme.html',  title:'Shazamme (Gold)' },
    ];
    const GROUPS = [
      { key:'event', label:'Event' },
      { key:'speakers', label:'Speakers' },
      { key:'sponsors', label:'Sponsors' },
    ];

    document.getElementById('grid').innerHTML = GROUPS.map(g => {
      const items = CARDS.filter(c => c.group === g.key);
      if(!items.length) return '';
      const figs = items.map(c => {
        const url = BASE + c.file;
        return `
        <figure class="thumb">
          <div class="frame"><iframe src="${url}?embed=1" loading="lazy" scrolling="no" tabindex="-1"></iframe></div>
          <figcaption>
            <span class="t">${c.title}</span>
            <span class="acts">
              <a href="${url}" target="_blank" rel="noopener">Open</a>
              <a href="${url}?dl=2" target="_blank" rel="noopener">PNG ⬇</a>
            </span>
          </figcaption>
        </figure>`;
      }).join('');
      return `<section data-group="${g.key}"><h2>${g.label}</h2><div class="row">${figs}</div></section>`;
    }).join('');

    const chips = document.querySelectorAll('.chip');
    chips.forEach(c => c.addEventListener('click', () => {
      chips.forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      const f = c.dataset.filter;
      document.querySelectorAll('section[data-group]').forEach(s => {
        s.classList.toggle('hidden', f !== 'all' && s.dataset.group !== f);
      });
    }));
  </script>
</body>
</html>
